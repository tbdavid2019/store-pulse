<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 白色背景 -->
  <rect width="512" height="512" fill="white" rx="80"/>
  
  <!-- Google Maps 風格綠色圓形背景 -->
  <circle cx="256" cy="256" r="220" fill="#34a853"/>
  
  <!-- 地圖標記 -->
  <g transform="translate(256, 256)">
    <!-- 標記陰影 -->
    <circle cx="4" cy="-26" r="30" fill="rgba(0,0,0,0.2)"/>
    <polygon points="-4,7 4,27 12,7" fill="rgba(0,0,0,0.2)"/>
    
    <!-- 標記主體 -->
    <circle cx="0" cy="-30" r="30" fill="white" stroke="#ddd" stroke-width="3"/>
    
    <!-- 標記尖端 -->
    <polygon points="-8,3 0,23 8,3" fill="white" stroke="#ddd" stroke-width="2"/>
    
    <!-- 商店建築在標記內 -->
    <g transform="translate(0, -30)">
      <!-- 建築主體 (Google 藍色) -->
      <rect x="-10" y="-5" width="20" height="15" fill="#4285f4"/>
      
      <!-- 屋頂 (Google 紅色) -->
      <polygon points="-12,-5 0,-15 12,-5" fill="#ea4335"/>
      
      <!-- 門 (白色) -->
      <rect x="-3" y="3" width="6" height="8" fill="white"/>
    </g>
  </g>
  
  <!-- 評分指示器 (小圓點) -->
  <g transform="translate(256, 316)">
    <circle cx="-40" cy="0" r="4" fill="#ffc107"/>
    <circle cx="-20" cy="0" r="4" fill="#ffc107"/>
    <circle cx="0" cy="0" r="4" fill="#ffc107"/>
    <circle cx="20" cy="0" r="4" fill="#ffc107"/>
    <circle cx="40" cy="0" r="4" fill="#c8c8c8"/>
  </g>
  
  <!-- 標題文字 -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        text-anchor="middle" fill="#34a853">
    Store Pulse
  </text>
</svg>